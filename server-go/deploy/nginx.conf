# Era Online — nginx reverse proxy configuration
#
# This is OPTIONAL. The game itself connects directly to port 6969 (TLS binary
# protocol) — nginx cannot proxy that. This config only affects the plain HTTP
# API on port 6970.
#
# When to use this:
#   - You want HTTPS on the HTTP API endpoint (status page, registration)
#   - You want IP-level rate limiting at the nginx layer
#   - You want to serve a web-based status page at your domain
#
# When NOT to use this:
#   - You are only running a game server with no web presence
#   - In that case leave port 6970 open directly (already done by setup-vps.sh)
#
# Installation:
#   1. Install nginx:    apt install nginx
#   2. Install certbot:  apt install certbot python3-certbot-nginx
#   3. Copy this file:   cp nginx.conf /etc/nginx/sites-available/eraonline
#   4. Enable it:        ln -s /etc/nginx/sites-available/eraonline \
#                                /etc/nginx/sites-enabled/eraonline
#   5. Remove default:   rm -f /etc/nginx/sites-enabled/default
#   6. Get TLS cert:     certbot --nginx -d yourdomain.example.com
#   7. Test config:      nginx -t
#   8. Reload nginx:     systemctl reload nginx
#   9. Update firewall:  ufw allow 80/tcp && ufw allow 443/tcp
#
# UFW note: Port 6970 can be closed to the public once nginx is in place:
#   ufw delete allow 6970/tcp

# ---------------------------------------------------------------------------
# Rate limiting zones (defined in the http{} context — put this in
# /etc/nginx/conf.d/rate-limit.conf or inside /etc/nginx/nginx.conf http{})
# ---------------------------------------------------------------------------
# limit_req_zone $binary_remote_addr zone=api:10m rate=20r/m;
# limit_req_zone $binary_remote_addr zone=register:10m rate=5r/m;

# ---------------------------------------------------------------------------
# HTTP — redirect to HTTPS (populated by certbot, shown here for reference)
# ---------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name _;   # Replace _ with your actual domain, e.g. play.example.com

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Redirect all other HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------------------------------------------------------------------------
# HTTPS — proxy to Era Online HTTP API
# ---------------------------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name _;   # Replace with your domain

    # TLS certificates — managed by certbot after you run:
    #   certbot --nginx -d yourdomain.example.com
    ssl_certificate     /etc/letsencrypt/live/yourdomain.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.example.com/privkey.pem;

    # Modern TLS settings (A+ on SSL Labs)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy no-referrer;

    # Hide nginx version
    server_tokens off;

    # -----------------------------------------------------------------------
    # Public status page — no auth required, used by Uptime Robot etc.
    # -----------------------------------------------------------------------
    location = /status {
        proxy_pass http://127.0.0.1:6970/status;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 5s;
        proxy_connect_timeout 3s;

        # Cache status responses for 5 seconds to absorb monitoring floods
        proxy_cache_bypass 1;
        add_header Cache-Control "no-store";
    }

    # -----------------------------------------------------------------------
    # HTTP API — all /api/ routes proxied to the game server
    # Rate limit: 20 requests/minute per IP, burst of 5
    # -----------------------------------------------------------------------
    location /api/ {
        # Uncomment these after adding the limit_req_zone lines above:
        # limit_req zone=api burst=5 nodelay;
        # limit_req_status 429;

        proxy_pass http://127.0.0.1:6970;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
        proxy_send_timeout 10s;

        # Don't pass through the server header from the backend
        proxy_hide_header Server;
    }

    # -----------------------------------------------------------------------
    # Block everything else
    # -----------------------------------------------------------------------
    location / {
        return 404;
    }
}
